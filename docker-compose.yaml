  metastore:
    image: my-hive
    build: 
      context: .
      dockerfile: ./dockerfiles/hive.dockerfile
    container_name: metastore
    ports:
      - "9083:9083"
    networks:
      - project-net
    environment:
      - SERVICE_NAME=metastore
      - HIVE_POSTGRES_USERNAME=postgres
      - HIVE_POSTGRES_PASSWORD=postgres
    depends_on:
      - postgres-hive
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1g
        reservations:
          memory: 128M
    volumes:
      - ./config/metastore-site.xml:/opt/hive-metastore/conf/metastore-site.xml
      - ./config/core-site.xml:/opt/hive-metastore/conf/core-site.xml

  postgres-hive:
    container_name: postgres-hive
    image: postgres:12
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=metastore
    networks:
      - project-net
    volumes:
      - ./docker-data/postgres-hive:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "5433:5432"

  trino:
    image: trinodb/trino:479
    container_name: trino
    ports:
      - "9080:8080"
    volumes:
      - ./config/trino/etc:/etc/trino
    networks:
      - project-net
  
  debezium:
    image: debezium/connect:3.0.0.Final
    container_name: debezium
    networks:
      - project-net
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - kafka
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=debezium_connect_configs
      - OFFSET_STORAGE_TOPIC=debezium_connect_offsets
      - STATUS_STORAGE_TOPIC=debezium_connect_status
  
  setup:
    image: setup
    container_name: setup
    build: 
      context: ./others
      dockerfile: ./Dockerfile
    networks:
      - project-net
    depends_on:
      - postgres
      - debezium

